<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自己紹介</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --yellow: #FFE14D;
    --orange: #FF8C42;
    --pink:   #FF6B9D;
    --mint:   #4ECDC4;
    --purple: #A78BFA;
    --white:  #FFFFFF;
    --dark:   #2D2D2D;
    --gray:   #6B7280;
    --bg:     #FFF9F0;
    --card:   #FFFFFF;
    --error:  #EF4444;
    --success:#10B981;
    --radius: 16px;
    --radius-sm: 10px;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background-color: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(255,225,77,0.35) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(78,205,196,0.3) 0%, transparent 40%),
      radial-gradient(circle at 80% 10%, rgba(255,107,157,0.25) 0%, transparent 35%),
      radial-gradient(circle at 20% 85%, rgba(167,139,250,0.25) 0%, transparent 35%);
  }

  .card {
    background: var(--card);
    border-radius: 28px;
    padding: 2.5rem 2.5rem 2rem;
    width: 100%;
    max-width: 520px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 8px;
    background: linear-gradient(90deg, var(--yellow), var(--orange), var(--pink), var(--mint), var(--purple));
    border-radius: 28px 28px 0 0;
  }

  .title-wrap {
    text-align: center;
    margin-bottom: 2rem;
  }

  .title {
    font-family: 'Nunito', 'Noto Sans JP', sans-serif;
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--dark);
    letter-spacing: 0.04em;
    line-height: 1.2;
  }

  .title-badge {
    display: inline-block;
    background: var(--yellow);
    color: var(--dark);
    font-family: 'Nunito', sans-serif;
    font-size: 0.78rem;
    font-weight: 800;
    padding: 3px 12px;
    border-radius: 20px;
    margin-top: 8px;
    letter-spacing: 0.06em;
  }

  .field {
    margin-bottom: 1.4rem;
  }

  label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 6px;
    letter-spacing: 0.02em;
  }

  label .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  label .required {
    font-size: 0.72rem;
    color: var(--white);
    background: var(--pink);
    padding: 1px 7px;
    border-radius: 20px;
    font-weight: 700;
    margin-left: auto;
  }

  input[type="text"], textarea, select {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 2px solid #E5E7EB;
    border-radius: var(--radius-sm);
    font-size: 1rem;
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--dark);
    background: #FAFAFA;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    appearance: none;
  }

  input[type="text"]:focus, textarea:focus, select:focus {
    border-color: var(--mint);
    background: var(--white);
    box-shadow: 0 0 0 3px rgba(78,205,196,0.18);
  }

  input.error, textarea.error {
    border-color: var(--error);
    box-shadow: 0 0 0 3px rgba(239,68,68,0.13);
  }

  textarea {
    resize: vertical;
    min-height: 110px;
    line-height: 1.7;
  }

  .char-counter {
    text-align: right;
    font-size: 0.78rem;
    color: var(--gray);
    margin-top: 4px;
    transition: color 0.2s;
  }

  .char-counter.warn { color: var(--error); font-weight: 700; }
  .char-counter.ok { color: var(--success); font-weight: 700; }

  .error-msg {
    color: var(--error);
    font-size: 0.78rem;
    margin-top: 5px;
    display: none;
    font-weight: 700;
    padding-left: 4px;
  }

  .error-msg.show { display: block; }

  .select-wrap {
    position: relative;
  }

  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.1rem;
    color: var(--gray);
    pointer-events: none;
  }

  select {
    cursor: pointer;
    padding-right: 2.5rem;
  }

  .btn {
    width: 100%;
    padding: 0.95rem;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 1.05rem;
    font-family: 'Nunito', 'Noto Sans JP', sans-serif;
    font-weight: 800;
    cursor: pointer;
    background: linear-gradient(135deg, var(--orange), var(--pink));
    color: var(--white);
    letter-spacing: 0.08em;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    box-shadow: 0 4px 16px rgba(255,107,157,0.35);
    margin-top: 0.5rem;
  }

  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(255,107,157,0.45); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .success-screen {
    display: none;
    text-align: center;
    padding: 1.5rem 0 0.5rem;
  }

  .success-screen.show { display: block; }

  .success-icon {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--mint), var(--purple));
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.2rem;
    font-size: 2rem;
    box-shadow: 0 4px 20px rgba(78,205,196,0.3);
    animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes pop {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .success-title {
    font-family: 'Nunito', sans-serif;
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--dark);
    margin-bottom: 0.5rem;
  }

  .success-sub {
    color: var(--gray);
    font-size: 0.9rem;
    line-height: 1.7;
  }

  .loader {
    display: none;
    width: 22px;
    height: 22px;
    border: 3px solid rgba(255,255,255,0.4);
    border-top-color: var(--white);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .spinner-wrap { display: flex; align-items: center; justify-content: center; gap: 8px; }

  @media (max-width: 480px) {
    .card { padding: 2rem 1.25rem 1.5rem; border-radius: 20px; }
    .title { font-size: 1.7rem; }
  }
</style>
</head>
<body>
<iframe name="hidden-iframe" style="display:none;"></iframe>
<div class="card">
  <div class="title-wrap">
    <div class="title">🎉 自己紹介</div>
    <span class="title-badge">SELF INTRODUCTION</span>
  </div>

  <div id="form-area">
    <div class="field">
      <label>
        <span class="dot" style="background:var(--orange)"></span>
        名前・ニックネーム
        <span class="required">必須</span>
      </label>
      <input type="text" id="name" placeholder="例：たろう、Taro、T くん" maxlength="50">
      <div class="error-msg" id="name-err">名前・ニックネームを入力してください</div>
    </div>

    <div class="field">
      <label>
        <span class="dot" style="background:var(--mint)"></span>
        出身（国）
        <span class="required">必須</span>
      </label>
      <div class="select-wrap">
        <select id="country">
          <option value="">選択してください</option>
          <option>日本</option>
          <option>中国</option>
          <option>韓国</option>
          <option>台湾</option>
          <option>インド</option>
          <option>インドネシア</option>
          <option>タイ</option>
          <option>ベトナム</option>
          <option>フィリピン</option>
          <option>マレーシア</option>
          <option>ミャンマー</option>
          <option>カンボジア</option>
          <option>ネパール</option>
          <option>バングラデシュ</option>
          <option>スリランカ</option>
          <option>パキスタン</option>
          <option>アメリカ</option>
          <option>カナダ</option>
          <option>ブラジル</option>
          <option>メキシコ</option>
          <option>イギリス</option>
          <option>フランス</option>
          <option>ドイツ</option>
          <option>イタリア</option>
          <option>スペイン</option>
          <option>オーストラリア</option>
          <option>ニュージーランド</option>
          <option>その他</option>
        </select>
      </div>
      <div class="error-msg" id="country-err">出身（国）を選択してください</div>
    </div>

    <div class="field">
      <label>
        <span class="dot" style="background:var(--purple)"></span>
        休みの日にどんなことをしますか？
        <span class="required">必須</span>
      </label>
      <textarea id="hobby" placeholder="例：友達とカフェ巡りをしたり、家でゲームをしたりしています。最近はキャンプにもはまっています！" maxlength="300"></textarea>
      <div class="char-counter" id="hobby-counter">0 / 20文字以上で入力してください</div>
      <div class="error-msg" id="hobby-err">20文字以上で具体的に教えてください！</div>
    </div>

    <button class="btn" id="submit-btn" onclick="submitForm()">
      <span class="spinner-wrap">
        <span id="btn-text">送信する ✨</span>
        <div class="loader" id="loader"></div>
      </span>
    </button>
  </div>

  <div class="success-screen" id="success-screen">
    <div class="success-icon">✅</div>
    <div class="success-title">送信完了！</div>
    <p class="success-sub">自己紹介の入力、ありがとうございました🎊<br>ワークショップを楽しんでいきましょう！</p>
  </div>
</div>

<script>
  // ★ここにGASのウェブアプリURLを貼り付けてください★
  //const GAS_URL = 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec';
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbxYcuNbm3xrcqtqUXIoF7DwttuTWTrhIeDCRVGhypiQ6NaqQ_VhzKd4xrlSguE6r5z8/exec';

  const hobbyEl  = document.getElementById('hobby');
  const counterEl = document.getElementById('hobby-counter');

  hobbyEl.addEventListener('input', () => {
    const len = hobbyEl.value.length;
    counterEl.textContent = `${len} 文字`;
    if (len === 0) {
      counterEl.className = 'char-counter';
      counterEl.textContent = '0 / 20文字以上で入力してください';
    } else if (len < 20) {
      counterEl.className = 'char-counter warn';
      counterEl.textContent = `${len} 文字（あと ${20 - len} 文字以上入力してください）`;
    } else {
      counterEl.className = 'char-counter ok';
      counterEl.textContent = `${len} 文字 ✓`;
    }
  });

  function validate() {
    let ok = true;

    const name    = document.getElementById('name');
    const country = document.getElementById('country');
    const nameErr    = document.getElementById('name-err');
    const countryErr = document.getElementById('country-err');
    const hobbyErr   = document.getElementById('hobby-err');

    [name, country, hobbyEl].forEach(el => el.classList.remove('error'));
    [nameErr, countryErr, hobbyErr].forEach(el => el.classList.remove('show'));

    if (!name.value.trim()) {
      name.classList.add('error');
      nameErr.classList.add('show');
      ok = false;
    }
    if (!country.value) {
      country.classList.add('error');
      countryErr.classList.add('show');
      ok = false;
    }
    if (hobbyEl.value.trim().length < 20) {
      hobbyEl.classList.add('error');
      hobbyErr.classList.add('show');
      ok = false;
    }
    return ok;
  }

  async function submitForm() {
  if (!validate()) return;

  const btn    = document.getElementById('submit-btn');
  const btnTxt = document.getElementById('btn-text');
  const loader = document.getElementById('loader');

  btn.disabled = true;
  btnTxt.style.display = 'none';
  loader.style.display = 'block';

  // 非表示のformを動的に作成してPOST送信
  const form = document.createElement('form');
  form.method = 'POST';
  form.action = GAS_URL;
  form.target = 'hidden-iframe'; // iframeに向けて送信（画面遷移させない）

  const fields = {
    name:    document.getElementById('name').value.trim(),
    country: document.getElementById('country').value,
    hobby:   document.getElementById('hobby').value.trim(),
  };

  for (const [key, value] of Object.entries(fields)) {
    const input = document.createElement('input');
    input.type  = 'hidden';
    input.name  = key;
    input.value = value;
    form.appendChild(input);
  }

  document.body.appendChild(form);
  form.submit();
  document.body.removeChild(form);

  // iframeへの送信なので完了を待たず成功扱いにする
  setTimeout(() => {
    document.getElementById('form-area').style.display = 'none';
    document.getElementById('success-screen').classList.add('show');
  }, 1500);

  btn.disabled = false;
  btnTxt.style.display = '';
  loader.style.display = 'none';
}
</script>
</body>
</html>
